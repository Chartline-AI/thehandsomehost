name: Tailwind build check

on:
  push:
    branches: [main]
    paths:
      - 'src/tailwind.css'
      - 'tailwind.config.js'
      - 'package.json'
      - 'package-lock.json'
      - 'index.html'
      - 'assets/tailwind.css'
      - '.github/workflows/tailwind.yml'
  pull_request:
    paths:
      - 'src/tailwind.css'
      - 'tailwind.config.js'
      - 'package.json'
      - 'package-lock.json'
      - 'index.html'
      - 'assets/tailwind.css'
      - '.github/workflows/tailwind.yml'

permissions:
  contents: read

jobs:
  verify-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Rebuild Tailwind CSS
        run: npm run build:css

      - name: Verify committed assets/tailwind.css matches fresh build
        run: |
          if ! git diff --quiet -- assets/tailwind.css; then
            echo "::error::assets/tailwind.css is out of date. Run 'npm run build:css' locally and commit the result."
            git --no-pager diff -- assets/tailwind.css | head -80
            exit 1
          fi
          echo "assets/tailwind.css is up to date."
